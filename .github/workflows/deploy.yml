# CI/CD — Déploiement GCP (Cloud Functions + Workflow)
#
# ⚠️ PLACEHOLDER — décision IaC reportée (Terraform vs scripts gcloud, point
#    d'arbitrage #4 du brief). Le workflow ci-dessous est COMMENTÉ : il ne
#    s'exécutera pas tant qu'on ne l'a pas activé et complété.
#
# Pré-requis avant activation (cf. brief §3.1 / §3.3) :
#   - Workload Identity Federation GitHub ↔ GCP (pas de clé JSON exportée)
#   - Secrets repo : GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
#   - Lint vert sur main

name: deploy
on:
  workflow_dispatch: {} # déclenchement manuel uniquement pour l'instant

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint

