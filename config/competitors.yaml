# ============================================================================
# Liste DÉFINIE des concurrents surveillés (demande métier : on connaît les
# sites, pas les pages — fn-discover trouve les pages par recherche).
# Ajouter un concurrent = une PR sur ce fichier.
# ============================================================================

competitors:
  - id: pixart
    nom: Pixartprinting
    base_url: https://www.pixartprinting.fr
    actif: true
    # Règles héritées de l'ancien pipeline Python (pixart_core.py) — les prix
    # affichés excluent le port : normalisation pour comparer à périmètre égal.
    normalisation:
      frais_port: 4.5                          # € ajoutés à chaque prix
      supplements: [{ quantite_min: 500, montant: 5 }]

  - id: helloprint
    nom: Helloprint
    # Le site a migré de helloprint.fr vers helloprint.com avec marchés par
    # chemin — fr-fr = France (fr-be existe aussi, attention au mélange).
    base_url: https://www.helloprint.com/fr-fr
    actif: true

  - id: exaprint
    nom: Exaprint
    base_url: https://www.exaprint.fr
    actif: true

  # Suivis dans le benchmark mensuel historique — ajoutés au pipeline (2026-06-11)
  - id: saxoprint
    nom: Saxoprint
    base_url: https://www.saxoprint.fr
    actif: true

  - id: easyflyer
    nom: Easyflyer
    base_url: https://www.easyflyer.fr
    actif: true

