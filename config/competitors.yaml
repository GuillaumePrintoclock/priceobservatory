# ============================================================================
# Liste DÉFINIE des concurrents surveillés (demande métier : on connaît les
# sites, pas les pages — fn-discover trouve les pages par recherche).
# Ajouter un concurrent = une PR sur ce fichier.
# ============================================================================

competitors:
  - id: pixart
    nom: Pixartprinting
    base_url: https://www.pixartprinting.fr
    actif: true
    # Règles héritées de l'ancien pipeline Python (pixart_core.py) — les prix
    # affichés excluent le port : normalisation pour comparer à périmètre égal.
    normalisation:
      frais_port: 4.5                          # € ajoutés à chaque prix
      supplements: [{ quantite_min: 500, montant: 5 }]

  - id: helloprint
    nom: Helloprint
    base_url: https://www.helloprint.fr
    actif: true

  - id: exaprint
    nom: Exaprint
    base_url: https://www.exaprint.fr
    actif: true

# Réglages communs de la recherche
recherche:
  mode: firecrawl_search   # recherche FireCrawl restreinte au domaine du concurrent
  resultats_max: 5         # candidats soumis au matching par produit × concurrent
