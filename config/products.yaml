# ============================================================================
# Watchlist produits — LE fichier que Sacha édite.
# Chaque entrée décrit UN produit à suivre par sa spécification, jamais par
# une URL concurrent. fn-discover construit la recherche à partir de la spec,
# matche le résultat, et gère son cache d'URLs tout seul (table resolved_urls).
#
# Les codes d'attributs sont ceux du catalogue Sylius (options de variantes) :
# ils font le pont entre nos prix internes et la page concurrent trouvée.
# ============================================================================

defaults:
  # Quantités comparées par défaut (points de la grille tarifaire concurrent)
  quantites: [100, 250, 500, 1000]
  # Délais de livraison comparés, en JOURS OUVRÉS (axe critique sur le Print :
  # les concurrents affichent une grille quantité × date de livraison ; on
  # convertit chaque date en J+n ouvrés pour aligner avec nos variantes _Jn).
  # Hérité de l'ancien pipeline Python (np.busday_count + mapping J→J par concurrent).
  delais: [J1, J3, J5]
  # Règles de matching candidat ↔ spec (pour trouver la bonne PAGE produit)
  matching:
    strict: [format]                  # correspondance exacte exigée
    tolerant: [material, finishing]   # équivalence acceptée (ex. 135g interne ≈ "130 g/m" Pixart) — évaluée par Gemini
    ignore: [check_service]           # axe interne, sans équivalent concurrent
  # NB : delay n'est PAS un critère de matching de page — c'est une dimension
  # d'EXTRACTION : fn-extract doit ramener la grille complète quantité × délai.

products:
  # --- MVP : 1 produit × 3 concurrents -------------------------------------
  - id: flyer-a5-135cb-recto
    famille: FLY                      # sylius_product.code
    libelle: "Flyer A5, papier couché brillant 135g, impression recto seul, sans finition"
    attributs:                        # axes Sylius (option = valeur)
      format: A5
      material: 135CB                 # 135G Couché brillant
      print_side: R                   # Recto seul
      finishing: NOF                  # Standard (sans finition)
    quantites: [50, 100, 250, 500, 1000]
    # mots_cles : facultatif — par défaut générés depuis le libellé + attributs.
    # Décommenter pour forcer la requête de recherche :
    # mots_cles: "flyer A5 135g brillant recto"

