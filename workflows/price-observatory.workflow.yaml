# Google Cloud Workflows — orchestration du pipeline unifié.
# Déclenché quotidiennement par Cloud Scheduler (porte d'entrée unique).
#
# Pour chaque couple produit × concurrent :
#   discover → (résolu) fetch → extract → load
#            → (non résolu OU page non conforme) load (discovery_failures)
#
# input.pairs : [{product_id, competitor_id}, ...] — fourni par le déclencheur
# (généré depuis config/products.yaml × config/competitors.yaml).

main:
  params: [input]
  steps:
    - init:
        assign:
          - pairs: ${input.pairs}

    - process_each_pair:
        for:
          value: pair
          in: ${pairs}
          steps:
            - discover:
                call: http.post
                args:
                  url: ${sys.get_env("FN_DISCOVER_URL")}
                  auth: { type: OIDC }
                  timeout: 550
                  body:
                    product_id: ${pair.product_id}
                    competitor_id: ${pair.competitor_id}
                result: discovered

            - branch_resolved:
                switch:
                  - condition: ${discovered.body.resolved == false}
                    steps:
                      - log_failure:
                          call: http.post
                          args:
                            url: ${sys.get_env("FN_LOAD_URL")}
                            auth: { type: OIDC }
                            body: ${discovered.body}
                      - skip:
                          next: continue
                next: fetch

            - fetch:
                call: http.post
                args:
                  url: ${sys.get_env("FN_FETCH_URL")}
                  auth: { type: OIDC }
                  timeout: 550
                  body: ${discovered.body}
                result: fetched

            - extract:
                call: http.post
                args:
                  url: ${sys.get_env("FN_EXTRACT_URL")}
                  auth: { type: OIDC }
                  timeout: 550
                  body: ${fetched.body}
                result: extracted

            # fn-load gère les 3 cas : offres valides, mismatch (invalide le
            # cache d'URL), échec — pas de branchement supplémentaire ici.
            - load:
                call: http.post
                args:
                  url: ${sys.get_env("FN_LOAD_URL")}
                  auth: { type: OIDC }
                  body: ${extracted.body}

    - done:
        return: "ok"
